<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- اسکریپت رسمی بله (الزامی) -->
    <script src="https://tapi.bale.ai/miniapp.js?3"></script>
    <script src="https://miniapp.bale.ai/sdk.js"></script>


    <title>انتخاب تاریخ</title>

    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            text-align: center;
        }

        .calendar {
            width: 92%;
            margin: 20px auto;
            background: var(--box);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0,0,0,0.15);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .header button {
            background: var(--btn-bg);
            color: var(--btn-fg);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-top: 10px;
        }

        .day-name {
            font-weight: bold;
            opacity: 0.7;
        }

        .day {
            padding: 10px 4px;
            border-radius: 8px;
            cursor: pointer;
            background: var(--day-bg);
            color: var(--day-fg);
        }

        .day:hover {
            background: var(--day-hover);
	    color: var(--day-text-hover);
	    font-weight : 900;
        }

        .empty {
            background: transparent;
        }
    </style>
</head>

<body>

<div class="calendar">
    <div class="header">
        <button id="prevMonth">❮</button>
        <div id="monthLabel"></div>
        <button id="nextMonth">❯</button>
    </div>

    <div class="days" id="daysContainer"></div>
</div>


<script>
    /* ---------------------------------------------------
       فعال‌سازی تم تیره/روشن از themeParams بله
    ----------------------------------------------------*/
    function applyTheme() {
        const theme = Bale.WebApp.themeParams;

        document.documentElement.style.setProperty("--bg", theme.bg_color || "#ffffff");
        document.documentElement.style.setProperty("--fg", theme.text_color || "#111");

        document.documentElement.style.setProperty("--box", theme.secondary_bg_color || "#f3f3f3");

        document.documentElement.style.setProperty("--btn-bg", theme.button_color || "#0088ff");
        document.documentElement.style.setProperty("--btn-fg", theme.button_text_color || "#ffffff");

        document.documentElement.style.setProperty("--day-bg", theme.bg_color || "#fff");
        document.documentElement.style.setProperty("--day-fg", theme.text_color || "#000");
        document.documentElement.style.setProperty("--day-hover", "#fff");
        document.documentElement.style.setProperty("--day-text-hover", "#000");
    }

    applyTheme();


    /* ---------------------------------------------------
       تبدیل تاریخ میلادی → شمسی (بدون پکیج)
    ----------------------------------------------------*/
    function gregorianToJalali(gy, gm, gd) {
        var g_d_m = [0,31,(gy%4===0&&gy%100!==0)||gy%400===0?29:28,31,30,31,30,31,31,30,31,30,31];
        var jy = (gy<=1600)?0:979;
        gy -= (gy<=1600)?621:1600;
        var gy2 = gm>2?gy+1:gy;
        var days = (365*gy) + parseInt((gy2+3)/4) - parseInt((gy2+99)/100) + parseInt((gy2+399)/400) - 80 + gd;
        for(var i=0;i<gm;i++) days += g_d_m[i];
        jy += 33 * parseInt(days / 12053); 
        days %= 12053;
        jy += 4 * parseInt(days/1461);
        days %= 1461;
        if (days > 365){
            jy += parseInt((days-1)/365);
            days = (days-1)%365;
        }
        var jm, jd;
        if (days < 186) {
            jm = 1 + parseInt(days/31);
            jd = 1 + (days % 31);
        } else {
            jm = 7 + parseInt((days-186)/30);
            jd = 1 + ((days-186)%30);
        }
        return [jy, jm, jd];
    }

    function jalaliToGregorian(jy, jm, jd) {
        jy += 1595;
        var days = -355668 + (365 * jy) + parseInt(jy/33)*8 + parseInt(((jy%33)+3)/4) +
            jd + (jm<7 ? (jm-1)*31 : ((jm-7)*30)+186);
        var gy = 400 * parseInt(days/146097);
        days %= 146097;

        if (days > 36524){
            gy += 100 * parseInt(--days/36524);
            days %= 36524;
            if (days >= 365) days++;
        }
        gy += 4 * parseInt(days/1461);
        days %= 1461;

        if (days > 365){
            gy += parseInt((days-1)/365);
            days = (days-1)%365;
        }

        var gd = days + 1;
        var sal_m = [0,31,(gy%4===0&&gy%100!==0)||gy%400===0?29:28,31,30,31,30,31,31,30,31,30,31];
        var gm = 0;
        for (gm=1; gm<=12; gm++){
            if (gd <= sal_m[gm]) break;
            gd -= sal_m[gm];
        }
        return [gy, gm, gd];
    }


    /* ---------------------------------------------------
       ساخت تقویم
    ----------------------------------------------------*/
    const daysContainer = document.getElementById("daysContainer");
    const monthLabel = document.getElementById("monthLabel");

    const weekDays = ["ش", "ی", "د", "س", "چ", "پ", "ج"];
    const monthNames = [
        "فروردین","اردیبهشت","خرداد",
        "تیر","مرداد","شهریور",
        "مهر","آبان","آذر",
        "دی","بهمن","اسفند"
    ];

    // وضعیت کنونی تقویم
    let today = new Date();
    let [jy, jm, jd] = gregorianToJalali(today.getFullYear(), today.getMonth()+1, today.getDate());

    function renderCalendar() {
        daysContainer.innerHTML = "";

        monthLabel.innerText = monthNames[jm - 1] + " " + jy;

        // اولین روز ماه
        let gStart = jalaliToGregorian(jy, jm, 1);
        let firstDay = new Date(gStart[0], gStart[1]-1, gStart[2]).getDay();

        // تعداد روزهای ماه
        let totalDays = (jm <= 6 ? 31 : (jm <= 11 ? 30 : (isLeap(jy) ? 30 : 29)));

        // نام روزهای هفته
        weekDays.forEach(d => {
            let div = document.createElement("div");
            div.className = "day-name";
            div.innerText = d;
            daysContainer.appendChild(div);
        });

        // خانه‌های خالی اول ماه
        for (let i = 0; i < firstDay; i++) {
            let empty = document.createElement("div");
            empty.className = "empty";
            daysContainer.appendChild(empty);
        }

        // روزهای ماه
        for (let d = 1; d <= totalDays; d++) {
            let day = document.createElement("div");
            day.className = "day";
            day.innerText = d;

	    // Highlight امروز
    		//if (jy === todayJY && jm === todayJM && d === todayJD) {
    		//    day.style.background = "#006aff";
    		//    day.style.color = "#fff";
    		//    day.style.fontWeight = "bold";
    		//    day.style.border = "2px solid #0041aa";
  		//  }

            day.onclick = () => selectDate(jy, jm, d);

            daysContainer.appendChild(day);
        }
    }

    function isLeap(jy) {
        return (((jy - (jy>0?474:473)) % 2820) + 474 + 38)*682 % 2816 < 682;
    }


    /* ---------------------------------------------------
        دکمه‌های ماه قبل / بعد
    ----------------------------------------------------*/
    document.getElementById("prevMonth").onclick = function(){
        jm--;
        if (jm < 1) { jm = 12; jy--; }
        renderCalendar();
    };

    document.getElementById("nextMonth").onclick = function(){
        jm++;
        if (jm > 12) { jm = 1; jy++; }
        renderCalendar();
    };

    /* ---------------------------------------------------
       ارسال تاریخ انتخاب‌شده به ربات
    ----------------------------------------------------*/
    function selectDate(y, m, d) {
        let selected = y + "/" + m + "/" + d;

        Bale.WebApp.sendData(JSON.stringify({
            type: "calendar_select",
            value: selected
        }));
    }

    /* ---------------------------------------------------
       Mini‑App آماده است
    ----------------------------------------------------*/
    Bale.WebApp.ready();

    renderCalendar();
</script>

</body>
</html>
